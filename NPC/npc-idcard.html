<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>謝爾夏｜NPC資料卡</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://shierusha.github.io/school-battle/students/st.css">
  <style>
.student-id[data-key="other_npcs.npc_category"] {
  left: 3%;
  top: 3%;
  width: 42%;
  height: 7.5%;
  letter-spacing: 0.03em;
  opacity: 0.5;
  white-space: nowrap;
  overflow: hidden;
  word-break: keep-all;
  text-shadow: none;
  font-weight: 400;
  font-style: normal;
}
</style>
</head>
<body>
  <div class="flip-card" id="flipCard">
    <div class="flip-card-inner">
      <div class="flip-card-front">
        <div class="container-16-9">
          <img class="bg-img" src="https://shierusha.github.io/school-battle/teachers/img/1.webp" alt="background">
          <div class="student-id" data-key="other_npcs.npc_category"></div>
          <div class="imgarea">
            <img class="char-img front-img" data-key="othernpc_images.front_url" src="" alt="NPC正面立繪">
          </div>
          <div class="bigname-box">
            <div class="name-box bigname" data-key="other_npcs.name"></div>
          </div>
          <div class="littlename-box">
            <div class="name-box littlename" data-key="other_npcs.nickname"></div>
          </div>
          <div class="row">
            <div class="row-1" style="left: 0;">
              <div class="info-box" style="height:7%;">
                <span class="info-label">陣營</span>
                <span class="info-value" data-key="other_npcs.alignment"></span>
              </div>
              <div class="info-box" style="height:7%;">
                <span class="info-label">種族</span>
                <span class="info-value" data-key="other_npcs.race"></span>
              </div>
              <div class="info-row" style="gap:2%;height:7%;">
                <div class="info-box" style="width:49%;">
                  <span class="info-label">年齡</span>
                  <span class="info-value" data-key="other_npcs.age"></span>
                </div>
                <div class="info-box" style="width:49%;">
                  <span class="info-label">性別</span>
                  <span class="info-value" data-key="other_npcs.gender"></span>
                </div>
              </div>
              <div class="info-box" style="height:15%;">
                <span class="info-label">個性</span>
                <span class="info-value" data-key="other_npcs.personality" style="margin-top: 0.35em;"></span>
                <button class="show-more-btn" style="display:none;">...MORE</button>
              </div>
              <div class="info-box" style="height:7%;">
                <span class="info-label">喜歡</span>
                <span class="info-value" data-key="other_npcs.likes"></span>
                <button class="show-more-btn" style="display:none;">...MORE</button>
              </div>
              <div class="info-box" style="height:7%;">
                <span class="info-label">討厭</span>
                <span class="info-value" data-key="other_npcs.hate"></span>
                <button class="show-more-btn" style="display:none;">...MORE</button>
              </div>
              <div class="info-box" style="height:7%;border-radius:5px 5px 0px 0px;">
                <span class="info-label">角色設定</span>
                <span style="color: #495079; font-weight: 700; letter-spacing: 0.05em; padding-left: 0.3em; align-self: center;">裏設定</span>
              </div>
              <div class="info-box" style="height:25%;margin-top:-2.8%;border-radius:0px 0px 5px 5px;">
                <span class="info-value" data-key="othernpc_notes.content" style="margin-top: 0.35em;"></span>
                <button class="show-more-btn" data-title="角色設定/裏設定">...MORE</button>
              </div>
            </div>
            <div class="row-1" style="right:0;">
              <div class="info-row" style="gap:2%; height:7%;">
                <div class="info-box" style="width:100%;">
                  <span class="info-label">身高</span>
                  <span class="info-value" data-key="other_npcs.height"></span>
                </div>
              </div>

              <div class="info-row" style="gap:2%; height:7%;">
                <div class="info-box" style="width:100%;">
                  <span class="info-label">體重</span>
                  <span class="info-value" data-key="other_npcs.weight"></span>
                </div>
              </div>
            
              <div class="info-box" style="height:7%;border-radius:5px 5px 0px 0px;">
                <span class="info-label">背景故事</span>
                <span style="color: #495079; font-weight: 700; letter-spacing: 0.05em; padding-left: 0.3em; align-self: center;">備註</span>
              </div>
              <div class="info-box" style="height:71%;margin-top:-2.8%;border-radius:0px 0px 5px 5px;">
                <span class="info-value" data-key="other_npcs.background" style="margin-top: 0.35em;"></span>
                <button class="show-more-btn" data-title="背景故事/備註">...MORE</button>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="flip-card-back">
        <div class="container-16-9">
          <img class="bg-img" src="https://shierusha.github.io/school-battle/teachers/img/1.webp" alt="background">
          <div class="skill-diamond" data-key="othernpc_skills.extra_skills" title="顯示額外技能" tabindex="0" style="cursor:pointer" value=""></div>
          <div class="student-id" data-key="other_npcs.npc_category"></div>
          <div class="imgarea">
            <img class="char-img back-img" data-key="othernpc_images.back_url" src="" alt="NPC背面立繪">
          </div>
          <div class="bigname-box">
            <div class="name-box bigname" data-key="other_npcs.name"></div>
          </div>
          <div class="littlename-box">
            <div class="name-box littlename" data-key="other_npcs.nickname"></div>
          </div>
          <div class="row">
            <div class="row-1" style="width: 100%;">
              <div class="info-box" style="height:7%;">
                <span class="info-label">職業</span>
                <span class="info-value" data-key="other_npcs.occupation_type"></span>
              </div>
              <div class="info-row" style="height:7%;">
                <div class="info-box" style="width:49.5%;">
                  <span class="info-label">屬性</span>
                  <span class="info-value" data-key="other_npcs.element"></span>
                </div>
                <div class="info-box" style="width:49.5%;">
                  <span class="info-label">屬性弱點</span>
                  <span class="info-value" data-key="element_weakness.element"></span>
                </div>
              </div>
              <div class="info-row" style="height:7%;">
                <div class="info-box" style="width:49.5%;">
                  <span class="info-label">定位</span>
                  <span class="info-value" data-key="other_npcs.preferred_role"></span>
                </div>
                <div class="info-box" style="width:49.5%;">
                  <span class="info-label">起始站位</span>
                  <span class="info-value" data-key="other_npcs.starting_position"></span>
                </div>
              </div>
              <div class="info-row" style="gap:0.3%; height:7%;">
                <div class="info-box" style="width:43.4%; border-radius: 5px 5px 0px 0px;">
                  <span class="info-label">技能</span>
                  <span class="info-value" data-key="othernpc_skills.1.skill_name"></span>
                </div>
                <div class="info-box" style="width:14%; border-radius: 5px 5px 0px 0px;">
                  <span class="info-label">CD</span>
                  <span class="info-value" data-key="othernpc_skills.1.cd"></span>
                </div>
                <div class="info-box" style="width:42%; border-radius: 5px 5px 0px 0px;">
                  <span class="info-label">效果</span>
                  <span class="info-value" data-key="othernpc_skills.1.max_targets"></span>
                  <span class="info-value" data-key="othernpc_skills.1.range"></span>
                </div>
              </div>
              <div class="info-row" style="gap:0.3%;height:27%; margin-top:-1.38%;">
                <div class="info-box" style="width:57.7%;border-radius:0px 0px 0px 5px;">
                  <span class="info-label">技能<br>描述</span>
                  <span class="info-value" data-key="othernpc_skills.1.description"></span>
                  <button class="show-more-btn" data-title="技能描述">...MORE</button>
                </div>
                <div class="info-box" style="width:42%;border-radius:0px 0px 5px 0px;">
                  <span class="info-value" data-key="othernpc_skills.1.effectsAndDebuffs"></span>
                  <button class="show-more-btn" style="display:none;">...MORE</button>
                </div>
              </div>
              <div class="info-row" style="gap:0.3%; height:7%;">
                <div class="info-box" style="width:43.4%; border-radius: 5px 5px 0px 0px;">
                  <span class="info-label">技能</span>
                  <span class="info-value" data-key="othernpc_skills.2.skill_name"></span>
                </div>
                <div class="info-box" style="width:14%; border-radius: 5px 5px 0px 0px;">
                  <span class="info-label">CD</span>
                  <span class="info-value" data-key="othernpc_skills.2.cd"></span>
                </div>
                <div class="info-box" style="width:42%; border-radius: 5px 5px 0px 0px;">
                  <span class="info-label">效果</span>
                  <span class="info-value" data-key="othernpc_skills.2.max_targets"></span>
                  <span class="info-value" data-key="othernpc_skills.2.range"></span>
                </div>
              </div>
              <div class="info-row" style="gap:0.3%;height:27%; margin-top:-1.38%;">
                <div class="info-box" style="width:57.7%;border-radius:0px 0px 0px 5px;">
                  <span class="info-label">技能<br>描述</span>
                  <span class="info-value" data-key="othernpc_skills.2.description"></span>
                  <button class="show-more-btn" data-title="技能描述">...MORE</button>
                </div>
                <div class="info-box" style="width:42%;border-radius:0px 0px 5px 0px;">
                  <div class="info-value-group">
                    <span class="info-value" data-key="othernpc_skills.2.effectsAndDebuffs"></span>
                  </div>
                  <button class="show-more-btn" style="display:none;">...MORE</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div id="info-modal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
      <div class="modal-header" id="info-modal-title">標題</div>
      <div class="modal-body" id="info-modal-body"></div>
    </div>
  </div>
  <script src="get-npc.js"></script>
</body>
</html>
